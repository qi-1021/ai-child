<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Child - 智能小孩</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 600px;
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            display: flex;
            flex-direction: column;
            height: 90vh;
            max-height: 800px;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 16px 16px 0 0;
            text-align: center;
        }

        .header h1 {
            font-size: 24px;
            margin-bottom: 5px;
        }

        .header p {
            font-size: 12px;
            opacity: 0.9;
        }

        .chat-area {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .message {
            display: flex;
            gap: 10px;
            animation: slideIn 0.3s ease-in-out;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message.user {
            justify-content: flex-end;
        }

        .message.ai {
            justify-content: flex-start;
        }

        .bubble {
            max-width: 70%;
            padding: 12px 16px;
            border-radius: 12px;
            word-wrap: break-word;
            line-height: 1.5;
        }

        .user .bubble {
            background: #667eea;
            color: white;
        }

        .ai .bubble {
            background: #f0f0f0;
            color: #333;
        }

        .ai-info {
            font-size: 12px;
            color: #999;
            margin-top: 5px;
            padding: 0 10px;
        }

        .input-area {
            padding: 15px;
            border-top: 1px solid #eee;
            display: flex;
            gap: 10px;
        }

        .input-area input {
            flex: 1;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 24px;
            font-size: 14px;
            outline: none;
            transition: border-color 0.3s;
        }

        .input-area input:focus {
            border-color: #667eea;
        }

        .input-area button {
            background: #667eea;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 24px;
            cursor: pointer;
            font-size: 14px;
            transition: background 0.3s;
        }

        .input-area button:hover {
            background: #5568d3;
        }

        .input-area button:disabled {
            background: #ccc;
            cursor: not-allowed;
        }

        .loading {
            display: flex;
            gap: 4px;
            padding: 12px 16px;
        }

        .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #667eea;
            animation: bounce 1.4s infinite;
        }

        .dot:nth-child(2) {
            animation-delay: 0.2s;
        }

        .dot:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes bounce {
            0%, 80%, 100% {
                transform: scale(0);
            }
            40% {
                transform: scale(1);
            }
        }

        .connection-status {
            position: absolute;
            top: 10px;
            right: 10px;
            font-size: 12px;
            padding: 5px 10px;
            border-radius: 20px;
            background: #fff;
        }

        .connection-status.connected {
            color: #4caf50;
        }

        .connection-status.error {
            color: #f44336;
        }

        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: #999;
            text-align: center;
        }

        .empty-state-icon {
            font-size: 48px;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>💭 AI Child</h1>
            <p>与智能小孩进行对话</p>
        </div>

        <div class="chat-area" id="chatArea">
            <div class="empty-state">
                <div class="empty-state-icon">👋</div>
                <p>开始对话吧！</p>
            </div>
        </div>

        <div class="input-area">
            <input
                type="text"
                id="messageInput"
                placeholder="输入你想说的..."
                onkeypress="handleKeyPress(event)"
            />
            <button onclick="sendMessage()" id="sendBtn">发送</button>
        </div>
    </div>

    <script>
        // 尝试连接到服务器
        const API_URLS = [
            "http://localhost:8000/chat/text",
            "http://127.0.0.1:8000/chat/text",
            "http://localhost:8001/chat/text",
            "http://127.0.0.1:8001/chat/text"
        ];
        let API_URL = API_URLS[0];
        
        const chatArea = document.getElementById("chatArea");
        const messageInput = document.getElementById("messageInput");
        const sendBtn = document.getElementById("sendBtn");
        let isLoading = false;

        // 清空初始状态
        function clearEmpty() {
            if (chatArea.querySelector(".empty-state")) {
                chatArea.innerHTML = "";
            }
        }

        // 添加消息到聊天区
        function addMessage(content, isUser, info = null) {
            clearEmpty();

            const messageDiv = document.createElement("div");
            messageDiv.className = `message ${isUser ? "user" : "ai"}`;

            const bubble = document.createElement("div");
            bubble.className = "bubble";
            bubble.textContent = content;
            messageDiv.appendChild(bubble);

            if (info && !isUser) {
                const infoDiv = document.createElement("div");
                infoDiv.className = "ai-info";
                infoDiv.textContent = info;
                messageDiv.appendChild(infoDiv);
            }

            chatArea.appendChild(messageDiv);
            chatArea.scrollTop = chatArea.scrollHeight;
        }

        // 显示加载状态
        function showLoading() {
            clearEmpty();

            const messageDiv = document.createElement("div");
            messageDiv.className = "message ai";

            const loading = document.createElement("div");
            loading.className = "loading";

            for (let i = 0; i < 3; i++) {
                const dot = document.createElement("div");
                dot.className = "dot";
                loading.appendChild(dot);
            }

            messageDiv.appendChild(loading);
            messageDiv.id = "loadingMessage";
            chatArea.appendChild(messageDiv);
            chatArea.scrollTop = chatArea.scrollHeight;
        }

        // 移除加载状态
        function removeLoading() {
            const loading = document.getElementById("loadingMessage");
            if (loading) {
                loading.remove();
            }
        }

        // 发送消息
        async function sendMessage() {
            const text = messageInput.value.trim();
            if (!text || isLoading) return;

            // 添加用户消息
            addMessage(text, true);
            messageInput.value = "";
            isLoading = true;
            sendBtn.disabled = true;

            showLoading();

            // 尝试多个URL
            for (let url of API_URLS) {
                try {
                    const formData = new FormData();
                    formData.append("text", text);

                    const response = await fetch(url, {
                        method: "POST",
                        body: formData,
                        signal: AbortSignal.timeout(5000)
                    });

                    if (!response.ok) {
                        continue;
                    }

                    const data = await response.json();
                    removeLoading();

                    const content = data.reply || "（无语）";
                    const question = data.proactive_question || "";

                    addMessage(content, false, question ? `❓ ${question}` : null);
                    API_URL = url;  // 保存成功的URL
                    return;
                } catch (error) {
                    continue;
                }
            }

            // 所有URL都失败
            removeLoading();
            addMessage(`❌ 连接失败: 无法连接到服务器。请检查服务器是否运行在 localhost:8000 或 8001`, false);
            console.error("All URLs failed");
            
            isLoading = false;
            sendBtn.disabled = false;
            messageInput.focus();
        }

        // 回车发送
        function handleKeyPress(event) {
            if (event.key === "Enter" && !isLoading) {
                sendMessage();
            }
        }

        // 页面加载时焦点到输入框
        window.addEventListener("load", () => {
            messageInput.focus();
        });
    </script>
</body>
</html>
